<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Lab — Practice Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: #e6edf3;
    }

    /* ── Login ── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 420px;
      padding: 40px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
    }
    .login-box h1 { color: #3fb950; font-size: 22px; margin-bottom: 8px; }
    .login-box p  { color: #8b949e; font-size: 13px; margin-bottom: 32px; }
    .login-box label { color: #e6edf3; font-size: 14px; display: block; margin-bottom: 8px; }
    .login-row { display: flex; gap: 8px; }
    .login-box input {
      flex: 1; background: #0d1117; border: 1px solid #30363d;
      border-radius: 4px; color: #3fb950; padding: 8px 12px;
      font-family: 'Courier New', monospace; font-size: 14px; outline: none;
    }
    .login-box input:focus { border-color: #3fb950; }
    .btn-login {
      background: #238636; border: none; border-radius: 4px; color: #fff;
      padding: 8px 16px; cursor: pointer; font-family: 'Courier New', monospace;
      font-size: 14px; transition: background .15s;
    }
    .btn-login:hover { background: #2ea043; }
    .login-hint { color: #484f58; font-size: 12px; margin-top: 16px; }

    /* session restore banner */
    #restore-banner {
      display: none;
      margin-top: 20px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      color: #8b949e;
    }
    #restore-banner span { color: #3fb950; }
    .restore-actions { margin-top: 10px; display: flex; gap: 8px; }
    .btn-sm {
      background: #21262d; border: 1px solid #30363d; border-radius: 4px;
      color: #e6edf3; padding: 4px 12px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 12px;
    }
    .btn-sm:hover { background: #30363d; }
    .btn-sm.primary { background: #238636; border-color: #238636; }
    .btn-sm.primary:hover { background: #2ea043; }

    /* ── Terminal ── */
    #terminal-screen { display: none; flex-direction: column; flex: 1; min-height: 0; }

    .titlebar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }
    .titlebar-center { color: #8b949e; font-size: 12px; }
    .titlebar-actions { display: flex; gap: 8px; align-items: center; }
    .btn-save {
      background: #1c2128; border: 1px solid #30363d; border-radius: 4px;
      color: #8b949e; padding: 2px 10px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 12px;
    }
    .btn-save:hover { color: #3fb950; border-color: #3fb950; }

    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      line-height: 1.65;
      cursor: text;
    }
    .output-area::-webkit-scrollbar { width: 6px; }
    .output-area::-webkit-scrollbar-track { background: #0d1117; }
    .output-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .line-prompt { color: #3fb950; white-space: pre-wrap; word-break: break-all; }
    .line-out    { color: #e6edf3; white-space: pre-wrap; word-break: break-all; }
    .line-err    { color: #f85149; white-space: pre-wrap; word-break: break-all; }
    .line-info   { color: #8b949e; white-space: pre-wrap; word-break: break-all; font-style: italic; }

    .input-row {
      display: flex;
      align-items: center;
      color: #3fb950;
      margin-top: 2px;
    }
    .input-prompt { white-space: pre; color: #3fb950; }
    #cmd-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e6edf3; font-family: 'Courier New', monospace;
      font-size: 14px; caret-color: #3fb950;
    }

    .status-bar {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 3px 20px;
      font-size: 11px;
      color: #484f58;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #boot-overlay {
      position: fixed; inset: 0; background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 99;
    }
    #boot-overlay p { color: #3fb950; font-size: 14px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #30363d;
      border-top-color: #3fb950;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Boot overlay -->
<div id="boot-overlay">
  <div class="spinner"></div>
  <p>Booting Linux Lab...</p>
</div>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>$ linux-lab</h1>
    <p>Ubuntu 22.04.3 LTS — WebContainer Practice Server</p>
    <label for="username-input">Enter your username:</label>
    <div class="login-row">
      <input id="username-input" type="text" placeholder="e.g. student1" autocomplete="off" spellcheck="false"/>
      <button class="btn-login" id="login-btn">Login</button>
    </div>
    <div class="login-hint">No password required. Alphanumeric usernames only.</div>
    <div id="restore-banner">
      <span id="restore-msg"></span>
      <div class="restore-actions">
        <button class="btn-sm primary" id="restore-yes">Restore session</button>
        <button class="btn-sm" id="restore-no">Start fresh</button>
        <button class="btn-sm" id="restore-import">Import from file</button>
      </div>
    </div>
    <!-- hidden file input for import -->
    <input type="file" id="import-file" accept=".json" style="display:none"/>
  </div>
</div>

<!-- Terminal -->
<div id="terminal-screen">
  <div class="titlebar">
    <div class="dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="titlebar-center" id="title-label">bash</div>
    <div class="titlebar-actions">
      <button class="btn-save" id="save-btn" title="Save session to file">💾 Save Session</button>
      <button class="btn-save" id="logout-btn">Logout</button>
    </div>
  </div>

  <div class="output-area" id="output" onclick="document.getElementById('cmd-input').focus()">
    <div class="input-row">
      <span class="input-prompt" id="input-prompt-label"></span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"/>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-left">Ready</span>
    <span id="status-right"></span>
  </div>
</div>

<script type="module">
import { WebContainer } from 'https://esm.sh/@webcontainer/api';

// ─── State ────────────────────────────────────────────────────────────────────
let wc = null;
let username = '';
let cmdHistory = [];
let histIdx = -1;
let currentProcess = null;

const STORAGE_PREFIX = 'linuxlab_session_';

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const bootOverlay    = document.getElementById('boot-overlay');
const loginScreen    = document.getElementById('login-screen');
const terminalScreen = document.getElementById('terminal-screen');
const output         = document.getElementById('output');
const cmdInput       = document.getElementById('cmd-input');
const inputPromptLbl = document.getElementById('input-prompt-label');
const titleLabel     = document.getElementById('title-label');
const statusLeft     = document.getElementById('status-left');
const statusRight    = document.getElementById('status-right');
const restoreBanner  = document.getElementById('restore-banner');
const restoreMsg     = document.getElementById('restore-msg');
const importFileEl   = document.getElementById('import-file');

// ─── Boot WebContainer ────────────────────────────────────────────────────────
async function bootWebContainer() {
  try {
    wc = await WebContainer.boot();
    bootOverlay.style.display = 'none';
    loginScreen.style.display = 'flex';
    document.getElementById('username-input').focus();
  } catch (e) {
    bootOverlay.querySelector('p').textContent = `Boot failed: ${e.message}`;
    bootOverlay.querySelector('p').style.color = '#f85149';
  }
}

// ─── File system helpers ──────────────────────────────────────────────────────
const BASE_FS = (user) => ({
  'readme.txt': {
    file: { contents: `Welcome to Linux Lab, ${user}!\n\nThis is your personal practice environment.\nYour files are saved here between sessions.\n\nTry: ls, pwd, mkdir, cat, bash scripts and more!\n` }
  },
  'examples': {
    directory: {
      'hello.sh': { file: { contents: `#!/bin/sh\necho "Hello, ${user}!"\n` } },
      'loop.sh':  { file: { contents: `#!/bin/sh\nfor i in 1 2 3 4 5; do\n  echo "Line $i"\ndone\n` } },
      'args.sh':  { file: { contents: `#!/bin/sh\necho "You passed $# arguments"\nfor arg in "$@"; do\n  echo "  -> $arg"\ndone\n` } },
      'greet.js': { file: { contents: `const name = process.argv[2] || '${user}';\nconsole.log('Hello from Node.js, ' + name + '!');\n` } },
    }
  }
});

const HOME = (user) => `/home/${user}`;

async function mountBaseFS(user) {
  // Create home directory structure explicitly
  await wc.fs.mkdir(`/home`, { recursive: true });
  await wc.fs.mkdir(`/home/${user}`, { recursive: true });
  await wc.fs.mkdir(`/home/${user}/examples`, { recursive: true });
  const fs = BASE_FS(user);
  await wc.fs.writeFile(`/home/${user}/readme.txt`, fs['readme.txt'].file.contents);
  const ex = fs['examples'].directory;
  for (const [name, node] of Object.entries(ex)) {
    await wc.fs.writeFile(`/home/${user}/examples/${name}`, node.file.contents);
  }
}

// ─── Session persistence ──────────────────────────────────────────────────────
async function saveSession(user) {
  const files = await collectFiles(wc, HOME(user));
  const session = { user, timestamp: Date.now(), files, cwd: shellCwd };
  localStorage.setItem(STORAGE_PREFIX + user, JSON.stringify(session));
  return session;
}

async function collectFiles(wc, dirPath) {
  const result = {};
  try {
    const entries = await wc.fs.readdir(dirPath, { withFileTypes: true });
    for (const entry of entries) {
      const full = `${dirPath}/${entry.name}`;
      if (entry.isDirectory()) {
        result[entry.name] = { type: 'dir', children: await collectFiles(wc, full) };
      } else {
        try {
          const content = await wc.fs.readFile(full, 'utf-8');
          result[entry.name] = { type: 'file', content };
        } catch { result[entry.name] = { type: 'file', content: '' }; }
      }
    }
  } catch {}
  return result;
}

async function restoreFiles(wc, basePath, files) {
  for (const [name, node] of Object.entries(files)) {
    const p = `${basePath}/${name}`;
    if (node.type === 'dir') {
      try { await wc.fs.mkdir(p, { recursive: true }); } catch {}
      await restoreFiles(wc, p, node.children || {});
    } else {
      await wc.fs.writeFile(p, node.content || '');
    }
  }
}

function exportSession(session) {
  const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `linuxlab-${session.user}-${new Date(session.timestamp).toISOString().slice(0,10)}.json`;
  a.click();
}

// ─── Terminal output helpers ──────────────────────────────────────────────────
function appendLine(text, cls = 'line-out') {
  const inputRow = output.querySelector('.input-row');
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  output.insertBefore(div, inputRow);
  scrollBottom();
}

function appendHTML(html, cls = 'line-out') {
  const inputRow = output.querySelector('.input-row');
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  output.insertBefore(div, inputRow);
  scrollBottom();
}

function scrollBottom() {
  output.scrollTop = output.scrollHeight;
}

function clearOutput() {
  const inputRow = output.querySelector('.input-row');
  [...output.children].forEach(c => { if (c !== inputRow) c.remove(); });
}

function currentCwd() {
  return statusLeft.textContent.replace('cwd: ', '') || `/home/${username}`;
}

function updatePrompt(cwd) {
  let display = cwd;
  if (cwd === `/home/${username}`) display = '~';
  else if (cwd.startsWith(`/home/${username}/`)) display = '~/' + cwd.slice(`/home/${username}/`.length);
  inputPromptLbl.textContent = `${username}@linux-lab:${display}$ `;
  statusLeft.textContent = `cwd: ${cwd}`;
}

// ─── Shell execution ──────────────────────────────────────────────────────────
// Shell state: track cwd in JS since WebContainer's jsh doesn't persist it
let shellCwd = '/';

async function runCommand(cmd) {
  const trimmed = cmd.trim();
  if (!trimmed) return;

  appendLine(inputPromptLbl.textContent + trimmed, 'line-prompt');
  cmdHistory.unshift(trimmed);
  histIdx = -1;
  statusRight.textContent = 'running...';

  if (trimmed === 'clear') { clearOutput(); statusRight.textContent = ''; return; }
  if (trimmed === 'exit' || trimmed === 'logout') { doLogout(); return; }
  if (trimmed === 'save-session') {
    const s = await saveSession(username);
    exportSession(s);
    appendLine('Session saved and downloaded.', 'line-info');
    statusRight.textContent = '';
    return;
  }

  // Handle cd separately since jsh won't persist directory changes across spawns
  const cdMatch = trimmed.match(/^cd\s*(.*)?$/);
  if (cdMatch) {
    let target = (cdMatch[1] || '').trim() || HOME(username);
    if (target === '~') target = HOME(username);
    else if (target.startsWith('~/')) target = HOME(username) + '/' + target.slice(2);
    else if (!target.startsWith('/')) target = shellCwd + '/' + target;
    // Normalize path (resolve .. and .)
    const parts = target.split('/').filter(Boolean);
    const resolved = [];
    for (const p of parts) {
      if (p === '..') resolved.pop();
      else if (p !== '.') resolved.push(p);
    }
    const newPath = '/' + resolved.join('/');
    try {
      await wc.fs.readdir(newPath);
      shellCwd = newPath;
      updatePrompt(shellCwd);
    } catch {
      appendLine(`cd: ${cdMatch[1]}: No such file or directory`, 'line-err');
    }
    statusRight.textContent = '';
    cmdInput.focus();
    return;
  }

  try {
    // Wrap command so it runs in the correct cwd
    const wrapped = `cd "${shellCwd}" 2>/dev/null; ${trimmed}`;
    const proc = await wc.spawn('sh', ['-c', wrapped]);
    currentProcess = proc;

    let outBuf = '';
    proc.output.pipeTo(new WritableStream({
      write(chunk) {
        outBuf += chunk;
        const lines = outBuf.split('\n');
        outBuf = lines.pop();
        for (const l of lines) appendLine(l);
        scrollBottom();
      }
    }));

    const exit = await proc.exit;
    if (outBuf) appendLine(outBuf);
    if (exit !== 0) statusRight.textContent = `exit: ${exit}`;
    else statusRight.textContent = '';

  } catch (e) {
    appendLine(`Error: ${e.message}`, 'line-err');
    statusRight.textContent = 'error';
  }

  currentProcess = null;
  cmdInput.focus();
}

// ─── Login flow ───────────────────────────────────────────────────────────────
function checkSavedSession(user) {
  const raw = localStorage.getItem(STORAGE_PREFIX + user);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

async function startSession(user, session = null) {
  username = user;
  loginScreen.style.display = 'none';
  terminalScreen.style.display = 'flex';
  titleLabel.textContent = `${user}@linux-lab — bash`;
  document.getElementById('title-label').textContent = `${user}@linux-lab — bash`;

  await mountBaseFS(user);
  shellCwd = HOME(user);

  if (session) {
    appendLine(`Restoring session from ${new Date(session.timestamp).toLocaleString()}...`, 'line-info');
    await restoreFiles(wc, HOME(user), session.files || {});
    shellCwd = session.cwd || HOME(user);
    updatePrompt(shellCwd);
    appendLine('Session restored. Welcome back!', 'line-info');
  } else {
    updatePrompt(HOME(user));
    appendLine(`Welcome to Linux Lab, ${user}!`, 'line-info');
    appendLine(`WebContainer shell — type commands below.`, 'line-info');
    appendLine(`Tip: type 'save-session' or click 💾 to save your work.`, 'line-info');
  }

  appendLine('', 'line-out');
  cmdInput.focus();
}

function doLogout() {
  username = '';
  clearOutput();
  terminalScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  restoreBanner.style.display = 'none';
  document.getElementById('username-input').value = '';
  document.getElementById('username-input').focus();
}

// ─── Event listeners ──────────────────────────────────────────────────────────
document.getElementById('username-input').addEventListener('input', () => {
  const val = document.getElementById('username-input').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const session = val ? checkSavedSession(val) : null;
  if (session) {
    restoreMsg.innerHTML = `Found saved session for <span>${val}</span> from ${new Date(session.timestamp).toLocaleString()}`;
    restoreBanner.style.display = 'block';
  } else {
    restoreBanner.style.display = 'none';
  }
});

document.getElementById('login-btn').addEventListener('click', () => {
  const raw = document.getElementById('username-input').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if (!raw) return;
  startSession(raw, null);
});

document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('restore-yes').addEventListener('click', () => {
  const raw = document.getElementById('username-input').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const session = checkSavedSession(raw);
  startSession(raw, session);
});

document.getElementById('restore-no').addEventListener('click', () => {
  const raw = document.getElementById('username-input').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  startSession(raw, null);
});

document.getElementById('restore-import').addEventListener('click', () => importFileEl.click());

importFileEl.addEventListener('change', async () => {
  const file = importFileEl.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const session = JSON.parse(text);
    if (!session.user) throw new Error('Invalid session file');
    document.getElementById('username-input').value = session.user;
    startSession(session.user, session);
  } catch { alert('Invalid session file.'); }
  importFileEl.value = '';
});

document.getElementById('save-btn').addEventListener('click', async () => {
  if (!username) return;
  const s = await saveSession(username);
  exportSession(s);
  appendLine('Session saved and downloaded.', 'line-info');
});

document.getElementById('logout-btn').addEventListener('click', doLogout);

cmdInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value;
    cmdInput.value = '';
    await runCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const i = Math.min(histIdx + 1, cmdHistory.length - 1);
    histIdx = i;
    cmdInput.value = cmdHistory[i] ?? '';
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const i = Math.max(histIdx - 1, -1);
    histIdx = i;
    cmdInput.value = i === -1 ? '' : cmdHistory[i];
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    clearOutput();
  } else if (e.key === 'c' && e.ctrlKey) {
    if (currentProcess) { currentProcess.kill(); appendLine('^C', 'line-err'); }
  }
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
bootWebContainer();
</script>
</body>
</html>
