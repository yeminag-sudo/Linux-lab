<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Lab — Practice Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; color: #e6edf3; }

    #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 420px; padding: 40px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; }
    .login-box h1 { color: #3fb950; font-size: 22px; margin-bottom: 8px; }
    .login-box p  { color: #8b949e; font-size: 13px; margin-bottom: 32px; }
    .login-box label { color: #e6edf3; font-size: 14px; display: block; margin-bottom: 8px; }
    .login-row { display: flex; gap: 8px; }
    .login-box input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #3fb950; padding: 8px 12px; font-family: 'Courier New', monospace; font-size: 14px; outline: none; }
    .login-box input:focus { border-color: #3fb950; }
    .btn-login { background: #238636; border: none; border-radius: 4px; color: #fff; padding: 8px 16px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 14px; }
    .btn-login:hover { background: #2ea043; }
    .login-hint { color: #484f58; font-size: 12px; margin-top: 16px; }
    #restore-banner { display: none; margin-top: 20px; background: #1c2128; border: 1px solid #30363d; border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #8b949e; }
    #restore-banner span { color: #3fb950; }
    .restore-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm { background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; padding: 4px 12px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
    .btn-sm:hover { background: #30363d; }
    .btn-sm.primary { background: #238636; border-color: #238636; }
    .btn-sm.primary:hover { background: #2ea043; }

    #terminal-screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .titlebar { background: #161b22; border-bottom: 1px solid #30363d; padding: 6px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }
    .titlebar-center { color: #8b949e; font-size: 12px; }
    .titlebar-actions { display: flex; gap: 8px; }
    .btn-save { background: #1c2128; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; padding: 2px 10px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
    .btn-save:hover { color: #3fb950; border-color: #3fb950; }

    .output-area { flex: 1; overflow-y: auto; padding: 16px 20px; line-height: 1.65; cursor: text; }
    .output-area::-webkit-scrollbar { width: 6px; }
    .output-area::-webkit-scrollbar-track { background: #0d1117; }
    .output-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .line-prompt { color: #3fb950; white-space: pre-wrap; word-break: break-all; }
    .line-out    { color: #e6edf3; white-space: pre-wrap; word-break: break-all; }
    .line-err    { color: #f85149; white-space: pre-wrap; word-break: break-all; }
    .line-info   { color: #8b949e; white-space: pre-wrap; font-style: italic; }

    .input-row { display: flex; align-items: center; margin-top: 2px; }
    #cmd-input { flex: 1; background: transparent; border: none; outline: none; color: #e6edf3; font-family: 'Courier New', monospace; font-size: 14px; caret-color: #3fb950; }
    #input-prompt-label { white-space: pre; color: #3fb950; }

    .status-bar { background: #161b22; border-top: 1px solid #30363d; padding: 3px 20px; font-size: 11px; color: #484f58; display: flex; justify-content: space-between; flex-shrink: 0; }

    #boot-overlay { position: fixed; inset: 0; background: #0d1117; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 99; }
    #boot-overlay p { color: #3fb950; font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #3fb950; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="boot-overlay">
  <div class="spinner"></div>
  <p id="boot-msg">Booting Linux Lab...</p>
</div>

<div id="login-screen">
  <div class="login-box">
    <h1>$ linux-lab</h1>
    <p>WebContainer Practice Terminal</p>
    <label for="username-input">Enter your username:</label>
    <div class="login-row">
      <input id="username-input" type="text" placeholder="e.g. student1" autocomplete="off" spellcheck="false"/>
      <button class="btn-login" id="login-btn">Login</button>
    </div>
    <div class="login-hint">No password required. Alphanumeric usernames only.</div>
    <div id="restore-banner">
      <span id="restore-msg"></span>
      <div class="restore-actions">
        <button class="btn-sm primary" id="restore-yes">Restore session</button>
        <button class="btn-sm" id="restore-no">Start fresh</button>
        <button class="btn-sm" id="restore-import">Import from file</button>
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none"/>
  </div>
</div>

<div id="terminal-screen">
  <div class="titlebar">
    <div class="dots">
      <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    </div>
    <div class="titlebar-center" id="title-label">bash</div>
    <div class="titlebar-actions">
      <button class="btn-save" id="save-btn">💾 Save Session</button>
      <button class="btn-save" id="logout-btn">Logout</button>
    </div>
  </div>
  <div class="output-area" id="output" onclick="document.getElementById('cmd-input').focus()">
    <div class="input-row">
      <span id="input-prompt-label"></span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"/>
    </div>
  </div>
  <div class="status-bar">
    <span id="status-left">Ready</span>
    <span id="status-right"></span>
  </div>
</div>

<script type="module">
import { WebContainer } from 'https://esm.sh/@webcontainer/api';

// ── State ──────────────────────────────────────────────────────────────────
let wc = null;
let wcRoot = '';      // WebContainer's actual root (e.g. /home/randomhash)
let username = '';
let shellCwd = '';    // absolute path inside WC
let cmdHistory = [];
let histIdx = -1;
let currentProcess = null;
const STORAGE_PREFIX = 'linuxlab_v4_';

// ── DOM ────────────────────────────────────────────────────────────────────
const bootOverlay   = document.getElementById('boot-overlay');
const bootMsg       = document.getElementById('boot-msg');
const loginScreen   = document.getElementById('login-screen');
const termScreen    = document.getElementById('terminal-screen');
const output        = document.getElementById('output');
const cmdInput      = document.getElementById('cmd-input');
const promptLbl     = document.getElementById('input-prompt-label');
const statusLeft    = document.getElementById('status-left');
const statusRight   = document.getElementById('status-right');
const restoreBanner = document.getElementById('restore-banner');
const restoreMsg    = document.getElementById('restore-msg');
const importFileEl  = document.getElementById('import-file');

// ── Helpers: spawn and capture stdout ─────────────────────────────────────
async function capture(cmd, cwd) {
  const proc = await wc.spawn('sh', ['-c', cmd], { cwd: cwd || wcRoot });
  let out = '';
  await proc.output.pipeTo(new WritableStream({ write(c) { out += c; } }));
  await proc.exit;
  return out.trim();
}

// ── Boot: discover WC real root ────────────────────────────────────────────
async function boot() {
  try {
    wc = await WebContainer.boot();
    // Discover the real root by running pwd
    wcRoot = await capture('pwd');
    bootOverlay.style.display = 'none';
    loginScreen.style.display = 'flex';
    document.getElementById('username-input').focus();
  } catch(e) {
    bootMsg.textContent = `Boot failed: ${e.message}`;
    bootMsg.style.color = '#f85149';
  }
}

// ── Path helpers ───────────────────────────────────────────────────────────
// "virtual" home shown to student: ~/  maps to  wcRoot/home/<user>/
function vHome() { return `${wcRoot}/home/${username}`; }

// Convert real WC path → display path for prompt
function toDisplay(absPath) {
  const h = vHome();
  if (absPath === h) return '~';
  if (absPath.startsWith(h + '/')) return '~/' + absPath.slice(h.length + 1);
  // strip wcRoot prefix for cleaner display
  if (absPath.startsWith(wcRoot + '/')) return '/' + absPath.slice(wcRoot.length + 1);
  return absPath;
}

function normalizePath(p) {
  const parts = p.split('/').filter(Boolean);
  const out = [];
  for (const seg of parts) {
    if (seg === '..') out.pop();
    else if (seg !== '.') out.push(seg);
  }
  return '/' + out.join('/');
}

// Resolve a cd argument to an absolute WC path
function resolveArg(arg) {
  const h = vHome();
  if (!arg || arg === '~') return h;
  if (arg.startsWith('~/')) return normalizePath(h + '/' + arg.slice(2));
  if (arg.startsWith('/')) return normalizePath(wcRoot + arg); // treat / as wcRoot
  return normalizePath(shellCwd + '/' + arg);
}

// ── Update prompt ──────────────────────────────────────────────────────────
function updatePrompt(absCwd) {
  shellCwd = absCwd;
  promptLbl.textContent = `${username}@linux-lab:${toDisplay(absCwd)}$ `;
  statusLeft.textContent = `cwd: ${toDisplay(absCwd)}`;
}

// ── Setup user home ────────────────────────────────────────────────────────
async function setupUserHome() {
  const h = vHome();
  await wc.fs.mkdir(`${wcRoot}/home`, { recursive: true }).catch(() => {});
  await wc.fs.mkdir(h, { recursive: true }).catch(() => {});
  await wc.fs.mkdir(`${h}/examples`, { recursive: true }).catch(() => {});

  // Only write defaults if readme doesn't exist yet
  try { await wc.fs.readFile(`${h}/readme.txt`); }
  catch {
    await wc.fs.writeFile(`${h}/readme.txt`,
`Welcome to Linux Lab, ${username}!

This is your personal practice environment.
Files here persist between sessions when you save.

Try: ls, pwd, mkdir, touch, cat, echo, sh script.sh, node script.js
`);
    await wc.fs.writeFile(`${h}/examples/hello.sh`,
`#!/bin/sh\necho "Hello, ${username}!"\n`);
    await wc.fs.writeFile(`${h}/examples/loop.sh`,
`#!/bin/sh\nfor i in 1 2 3 4 5; do\n  echo "Line $i"\ndone\n`);
    await wc.fs.writeFile(`${h}/examples/greet.js`,
`const name = process.argv[2] || '${username}';\nconsole.log('Hello from Node.js, ' + name + '!');\n`);
  }
}

// ── Session persistence ────────────────────────────────────────────────────
async function collectFiles(dirPath) {
  const result = {};
  try {
    const entries = await wc.fs.readdir(dirPath, { withFileTypes: true });
    for (const e of entries) {
      const full = `${dirPath}/${e.name}`;
      if (e.isDirectory()) {
        result[e.name] = { type: 'dir', children: await collectFiles(full) };
      } else {
        try { result[e.name] = { type: 'file', content: await wc.fs.readFile(full, 'utf-8') }; }
        catch { result[e.name] = { type: 'file', content: '' }; }
      }
    }
  } catch {}
  return result;
}

async function restoreFiles(basePath, files) {
  for (const [name, node] of Object.entries(files)) {
    const p = `${basePath}/${name}`;
    if (node.type === 'dir') {
      await wc.fs.mkdir(p, { recursive: true }).catch(() => {});
      await restoreFiles(p, node.children || {});
    } else {
      await wc.fs.writeFile(p, node.content || '').catch(() => {});
    }
  }
}

async function saveSession() {
  const files = await collectFiles(vHome());
  const session = { user: username, timestamp: Date.now(), cwd: toDisplay(shellCwd), files };
  localStorage.setItem(STORAGE_PREFIX + username, JSON.stringify(session));
  return session;
}

function loadSession(user) {
  try { return JSON.parse(localStorage.getItem(STORAGE_PREFIX + user)); } catch { return null; }
}

function exportSession(session) {
  const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `linuxlab-${session.user}-${new Date(session.timestamp).toISOString().slice(0,10)}.json`;
  a.click();
}

// ── Output helpers ─────────────────────────────────────────────────────────
function appendLine(text, cls = 'line-out') {
  const row = output.querySelector('.input-row');
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = text;
  output.insertBefore(d, row);
  output.scrollTop = output.scrollHeight;
}

function clearOutput() {
  const row = output.querySelector('.input-row');
  [...output.children].forEach(c => { if (c !== row) c.remove(); });
}

// ── Run command ────────────────────────────────────────────────────────────
async function runCommand(raw) {
  const cmd = raw.trim();
  if (!cmd) return;

  appendLine(promptLbl.textContent + cmd, 'line-prompt');
  cmdHistory.unshift(cmd);
  histIdx = -1;
  statusRight.textContent = '';

  // built-ins
  if (cmd === 'clear') { clearOutput(); cmdInput.focus(); return; }
  if (cmd === 'exit' || cmd === 'logout') { doLogout(); return; }
  if (cmd === 'whoami') { appendLine(username); cmdInput.focus(); return; }
  if (cmd === 'hostname') { appendLine('linux-lab'); cmdInput.focus(); return; }
  if (cmd === 'save-session') {
    const s = await saveSession();
    exportSession(s);
    appendLine('Session saved and downloaded.', 'line-info');
    cmdInput.focus(); return;
  }

  // cd — handle in JS since each spawn is stateless
  const cdMatch = cmd.match(/^cd(\s+(.+))?$/);
  if (cdMatch) {
    const arg = (cdMatch[2] || '').trim();
    const target = resolveArg(arg);
    try {
      await wc.fs.readdir(target);
      updatePrompt(target);
    } catch {
      appendLine(`-sh: cd: ${arg || '~'}: No such file or directory`, 'line-err');
    }
    cmdInput.focus(); return;
  }

  // all other commands
  try {
    const proc = await wc.spawn('sh', ['-c', cmd], { cwd: shellCwd });
    currentProcess = proc;
    let buf = '';
    await proc.output.pipeTo(new WritableStream({
      write(chunk) {
        buf += chunk;
        const lines = buf.split('\n');
        buf = lines.pop();
        lines.forEach(l => appendLine(l));
        output.scrollTop = output.scrollHeight;
      }
    }));
    const code = await proc.exit;
    if (buf) appendLine(buf);
    if (code !== 0) statusRight.textContent = `exit ${code}`;
  } catch(e) {
    appendLine(`Error: ${e.message}`, 'line-err');
  }

  currentProcess = null;
  cmdInput.focus();
}

// ── Session start / logout ─────────────────────────────────────────────────
async function startSession(user, session = null) {
  username = user;
  loginScreen.style.display = 'none';
  termScreen.style.display = 'flex';
  document.getElementById('title-label').textContent = `${user}@linux-lab — sh`;

  await setupUserHome();

  if (session?.files) {
    appendLine(`Restoring session from ${new Date(session.timestamp).toLocaleString()}...`, 'line-info');
    await restoreFiles(vHome(), session.files);
    // restore cwd: map display path back to real WC path
    let restoredCwd = vHome();
    if (session.cwd && session.cwd !== '~') {
      if (session.cwd.startsWith('~/')) restoredCwd = vHome() + '/' + session.cwd.slice(2);
      else restoredCwd = wcRoot + session.cwd;
    }
    updatePrompt(restoredCwd);
    appendLine('Session restored. Welcome back!', 'line-info');
  } else {
    updatePrompt(vHome());
    appendLine(`Welcome to Linux Lab, ${user}!`, 'line-info');
    appendLine(`Type commands below. Use 'save-session' or 💾 to save your work.`, 'line-info');
  }
  appendLine('', 'line-out');
  cmdInput.focus();
}

function doLogout() {
  username = '';
  clearOutput();
  termScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  restoreBanner.style.display = 'none';
  document.getElementById('username-input').value = '';
  document.getElementById('username-input').focus();
}

// ── Login UI events ────────────────────────────────────────────────────────
function cleanName(s) { return s.trim().toLowerCase().replace(/[^a-z0-9_]/g,''); }
function getUser() { return cleanName(document.getElementById('username-input').value); }

document.getElementById('username-input').addEventListener('input', () => {
  const u = getUser();
  const s = u ? loadSession(u) : null;
  if (s) {
    restoreMsg.innerHTML = `Found saved session for <span>${u}</span> — ${new Date(s.timestamp).toLocaleString()}`;
    restoreBanner.style.display = 'block';
  } else {
    restoreBanner.style.display = 'none';
  }
});

document.getElementById('login-btn').addEventListener('click', () => { const u = getUser(); if (u) startSession(u, null); });
document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') { const u = getUser(); if (u) startSession(u, null); } });
document.getElementById('restore-yes').addEventListener('click', () => { const u = getUser(); if (u) startSession(u, loadSession(u)); });
document.getElementById('restore-no').addEventListener('click',  () => { const u = getUser(); if (u) startSession(u, null); });
document.getElementById('restore-import').addEventListener('click', () => importFileEl.click());
importFileEl.addEventListener('change', async () => {
  const file = importFileEl.files[0]; if (!file) return;
  try {
    const s = JSON.parse(await file.text());
    if (!s.user) throw new Error();
    document.getElementById('username-input').value = s.user;
    startSession(s.user, s);
  } catch { alert('Invalid session file.'); }
  importFileEl.value = '';
});

// ── Terminal UI events ─────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', async () => {
  if (!username) return;
  exportSession(await saveSession());
  appendLine('Session saved and downloaded.', 'line-info');
});
document.getElementById('logout-btn').addEventListener('click', doLogout);

cmdInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value; cmdInput.value = '';
    await runCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const i = Math.min(histIdx + 1, cmdHistory.length - 1);
    histIdx = i; cmdInput.value = cmdHistory[i] ?? '';
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const i = Math.max(histIdx - 1, -1);
    histIdx = i; cmdInput.value = i === -1 ? '' : cmdHistory[i];
  } else if (e.ctrlKey && e.key === 'l') {
    e.preventDefault(); clearOutput();
  } else if (e.ctrlKey && e.key === 'c') {
    if (currentProcess) { try { currentProcess.kill(); } catch {} appendLine('^C', 'line-err'); }
    cmdInput.focus();
  }
});

boot();
</script>
</body>
</html>
