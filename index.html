<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Lab — Practice Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; color: #e6edf3; }
    #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 420px; padding: 40px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; }
    .login-box h1 { color: #3fb950; font-size: 22px; margin-bottom: 8px; }
    .login-box p  { color: #8b949e; font-size: 13px; margin-bottom: 32px; }
    .login-box label { color: #e6edf3; font-size: 14px; display: block; margin-bottom: 8px; }
    .login-row { display: flex; gap: 8px; }
    .login-box input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #3fb950; padding: 8px 12px; font-family: 'Courier New', monospace; font-size: 14px; outline: none; }
    .login-box input:focus { border-color: #3fb950; }
    .btn-login { background: #238636; border: none; border-radius: 4px; color: #fff; padding: 8px 16px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 14px; }
    .btn-login:hover { background: #2ea043; }
    .login-hint { color: #484f58; font-size: 12px; margin-top: 16px; }
    #restore-banner { display: none; margin-top: 20px; background: #1c2128; border: 1px solid #30363d; border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #8b949e; }
    #restore-banner span { color: #3fb950; }
    .restore-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm { background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; padding: 4px 12px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
    .btn-sm:hover { background: #30363d; }
    .btn-sm.primary { background: #238636; border-color: #238636; }
    .btn-sm.primary:hover { background: #2ea043; }
    #terminal-screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .titlebar { background: #161b22; border-bottom: 1px solid #30363d; padding: 6px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f57; } .dot.yellow { background: #febc2e; } .dot.green { background: #28c840; }
    .titlebar-center { color: #8b949e; font-size: 12px; }
    .titlebar-actions { display: flex; gap: 8px; }
    .btn-save { background: #1c2128; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; padding: 2px 10px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
    .btn-save:hover { color: #3fb950; border-color: #3fb950; }
    .output-area { flex: 1; overflow-y: auto; padding: 16px 20px; line-height: 1.65; cursor: text; }
    .output-area::-webkit-scrollbar { width: 6px; }
    .output-area::-webkit-scrollbar-track { background: #0d1117; }
    .output-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .line-prompt { color: #3fb950; white-space: pre-wrap; word-break: break-all; }
    .line-out    { color: #e6edf3; white-space: pre-wrap; word-break: break-all; }
    .line-err    { color: #f85149; white-space: pre-wrap; word-break: break-all; }
    .line-info   { color: #8b949e; white-space: pre-wrap; font-style: italic; }
    .input-row { display: flex; align-items: center; margin-top: 2px; }
    #cmd-input { flex: 1; background: transparent; border: none; outline: none; color: #e6edf3; font-family: 'Courier New', monospace; font-size: 14px; caret-color: #3fb950; }
    #prompt-label { white-space: pre; color: #3fb950; flex-shrink: 0; }
    .status-bar { background: #161b22; border-top: 1px solid #30363d; padding: 3px 20px; font-size: 11px; color: #484f58; display: flex; justify-content: space-between; flex-shrink: 0; }
    #boot-overlay { position: fixed; inset: 0; background: #0d1117; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 99; }
    #boot-overlay p { color: #3fb950; font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #3fb950; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="boot-overlay"><div class="spinner"></div><p id="boot-msg">Booting Linux Lab...</p></div>

<div id="login-screen">
  <div class="login-box">
    <h1>$ linux-lab</h1>
    <p>WebContainer Practice Terminal</p>
    <label for="uname">Enter your username:</label>
    <div class="login-row">
      <input id="uname" type="text" placeholder="e.g. student1" autocomplete="off" spellcheck="false"/>
      <button class="btn-login" id="login-btn">Login</button>
    </div>
    <div class="login-hint">No password required. Alphanumeric usernames only.</div>
    <div id="restore-banner">
      <span id="restore-msg"></span>
      <div class="restore-actions">
        <button class="btn-sm primary" id="restore-yes">Restore session</button>
        <button class="btn-sm" id="restore-no">Start fresh</button>
        <button class="btn-sm" id="restore-import">Import from file</button>
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none"/>
  </div>
</div>

<div id="terminal-screen">
  <div class="titlebar">
    <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
    <div class="titlebar-center" id="title-label">sh</div>
    <div class="titlebar-actions">
      <button class="btn-save" id="save-btn">💾 Save</button>
      <button class="btn-save" id="logout-btn">Logout</button>
    </div>
  </div>
  <div class="output-area" id="output" onclick="document.getElementById('cmd-input').focus()">
    <div class="input-row">
      <span id="prompt-label"></span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"/>
    </div>
  </div>
  <div class="status-bar"><span id="status-left">Ready</span><span id="status-right"></span></div>
</div>

<script type="module">
import { WebContainer } from 'https://esm.sh/@webcontainer/api@1.3.0';

// ── globals ────────────────────────────────────────────────────────────────
let wc, username;
let shellCwd = '/';      // JS-tracked cwd (real WC absolute path)
let homeDir  = '/';      // user's home in WC
let cmdHistory = [], histIdx = -1;
let busy = false;
const SKEY = u => 'llv6_' + u;

// ── dom ────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const bootOverlay  = $('boot-overlay');
const bootMsg      = $('boot-msg');
const loginScreen  = $('login-screen');
const termScreen   = $('terminal-screen');
const output       = $('output');
const cmdInput     = $('cmd-input');
const promptLabel  = $('prompt-label');
const statusLeft   = $('status-left');
const statusRight  = $('status-right');

// ── output ─────────────────────────────────────────────────────────────────
function print(text, cls = 'line-out') {
  const row = output.querySelector('.input-row');
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = text;
  output.insertBefore(d, row);
  output.scrollTop = output.scrollHeight;
}
function clearOutput() {
  const row = output.querySelector('.input-row');
  [...output.children].forEach(c => { if (c !== row) c.remove(); });
}

// ── prompt ─────────────────────────────────────────────────────────────────
function setPrompt(absCwd) {
  shellCwd = absCwd;
  let display = absCwd;
  if (absCwd === homeDir) display = '~';
  else if (absCwd.startsWith(homeDir + '/')) display = '~/' + absCwd.slice(homeDir.length + 1);
  promptLabel.textContent = `${username}@linux-lab:${display}$ `;
  statusLeft.textContent = display;
}

// ── spawn helper: run one command, return {stdout, exit} ──────────────────
async function spawnCapture(args, cwd) {
  const proc = await wc.spawn(args[0], args.slice(1), { cwd });
  let out = '';
  await proc.output.pipeTo(new WritableStream({ write(c) { out += c; } }));
  const code = await proc.exit;
  return { out: out.trim(), code };
}

// ── run one command via sh, streaming output ───────────────────────────────
async function spawnStream(cmd, cwd) {
  // Use 'sh' with -c. cwd option is supported in WC >= 1.2
  const proc = await wc.spawn('sh', ['-c', cmd], { cwd });
  let buf = '';
  const ws = new WritableStream({
    write(chunk) {
      buf += chunk;
      const lines = buf.split('\n');
      buf = lines.pop();
      lines.forEach(l => print(l));
      output.scrollTop = output.scrollHeight;
    }
  });
  proc.output.pipeTo(ws);
  const code = await proc.exit;
  if (buf) print(buf);
  return code;
}

// ── path helpers ───────────────────────────────────────────────────────────
function normPath(p) {
  const segs = p.split('/').filter(Boolean);
  const out = [];
  for (const s of segs) {
    if (s === '..') out.pop();
    else if (s !== '.') out.push(s);
  }
  return '/' + out.join('/');
}

function resolveCd(arg) {
  if (!arg || arg === '~') return homeDir;
  if (arg.startsWith('~/')) return normPath(homeDir + '/' + arg.slice(2));
  if (arg.startsWith('/')) return normPath(arg);
  return normPath(shellCwd + '/' + arg);
}

// ── boot ───────────────────────────────────────────────────────────────────
async function boot() {
  try {
    wc = await WebContainer.boot();
    // Discover WC's real root by running pwd
    const { out } = await spawnCapture(['sh', '-c', 'pwd'], '/');
    // 'out' will be the real root e.g. /home/randomhash
    // We'll use this as base for all our paths
    window._wcActualRoot = out || '/';
    bootOverlay.style.display = 'none';
    loginScreen.style.display = 'flex';
    $('uname').focus();
  } catch(e) {
    bootMsg.textContent = 'Boot failed: ' + e.message;
    bootMsg.style.color = '#f85149';
  }
}

// ── setup user filesystem ──────────────────────────────────────────────────
async function setupHome(user) {
  // Build home path on top of WC's actual root
  const root = window._wcActualRoot;
  // Create home at <wcroot>/home/<user>
  // We use wc.fs.mkdir with the path relative to WC root
  // But WC paths in fs API are relative to WC's own root, so just use /home/user
  // and accept that internally it maps to wcroot/home/user
  const h = '/home/' + user;

  await wc.fs.mkdir('/home', { recursive: true }).catch(() => {});
  await wc.fs.mkdir(h, { recursive: true }).catch(() => {});
  await wc.fs.mkdir(h + '/examples', { recursive: true }).catch(() => {});

  // Verify the directory is actually accessible by spawning in it
  const check = await spawnCapture(['sh', '-c', 'pwd'], h).catch(() => null);

  if (check && check.code === 0) {
    // Great — h works as cwd
    homeDir = h;
  } else {
    // Fallback: use WC root + subdir
    const fallback = root + '/home/' + user;
    await wc.fs.mkdir(root + '/home', { recursive: true }).catch(() => {});
    await wc.fs.mkdir(fallback, { recursive: true }).catch(() => {});
    await wc.fs.mkdir(fallback + '/examples', { recursive: true }).catch(() => {});
    homeDir = fallback;
  }

  // Write starter files
  const write = (p, c) => wc.fs.writeFile(homeDir + p, c).catch(() => {});
  await write('/readme.txt',
`Welcome to Linux Lab, ${user}!

Files here persist when you save your session.
Try: ls, pwd, mkdir, touch, cat, echo, sh script.sh, node script.js
`);
  await write('/examples/hello.sh', `#!/bin/sh\necho "Hello, ${user}!"\n`);
  await write('/examples/loop.sh',  `#!/bin/sh\nfor i in 1 2 3 4 5; do\n  echo "Line $i"\ndone\n`);
  await write('/examples/greet.js', `const n = process.argv[2] || '${user}';\nconsole.log('Hello, ' + n + '!');\n`);

  return homeDir;
}

// ── session helpers ────────────────────────────────────────────────────────
async function collectFiles(path) {
  const res = {};
  try {
    for (const e of await wc.fs.readdir(path, { withFileTypes: true })) {
      const full = path + '/' + e.name;
      res[e.name] = e.isDirectory()
        ? { type: 'dir', children: await collectFiles(full) }
        : { type: 'file', content: await wc.fs.readFile(full, 'utf-8').catch(() => '') };
    }
  } catch {}
  return res;
}

async function restoreFiles(base, files) {
  for (const [n, node] of Object.entries(files)) {
    const p = base + '/' + n;
    if (node.type === 'dir') {
      await wc.fs.mkdir(p, { recursive: true }).catch(() => {});
      await restoreFiles(p, node.children || {});
    } else {
      await wc.fs.writeFile(p, node.content || '').catch(() => {});
    }
  }
}

async function doSave() {
  const files = await collectFiles(homeDir);
  const s = { user: username, timestamp: Date.now(), cwd: shellCwd, files };
  localStorage.setItem(SKEY(username), JSON.stringify(s));
  return s;
}

function loadSaved(u) {
  try { return JSON.parse(localStorage.getItem(SKEY(u))); } catch { return null; }
}

function exportJSON(s) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' }));
  a.download = `linuxlab-${s.user}-${new Date(s.timestamp).toISOString().slice(0,10)}.json`;
  a.click();
}

// ── enable / disable input ─────────────────────────────────────────────────
function enable() {
  busy = false;
  cmdInput.disabled = false;
  cmdInput.focus();
  statusRight.textContent = '';
}
function disable() {
  busy = true;
  cmdInput.disabled = true;
  statusRight.textContent = 'running…';
}

// ── run command ────────────────────────────────────────────────────────────
async function runCommand(raw) {
  const cmd = raw.trim();
  if (!cmd) return;

  print(promptLabel.textContent + cmd, 'line-prompt');
  cmdHistory.unshift(cmd);
  histIdx = -1;

  // ── built-ins ──────────────────────────────────────────────────────────
  if (cmd === 'clear')   { clearOutput(); return; }
  if (cmd === 'whoami')  { print(username); return; }
  if (cmd === 'hostname'){ print('linux-lab'); return; }
  if (cmd === 'exit' || cmd === 'logout') { doLogout(); return; }
  if (cmd === 'save-session') {
    const s = await doSave(); exportJSON(s);
    print('Session saved and downloaded.', 'line-info'); return;
  }

  // ── cd ─────────────────────────────────────────────────────────────────
  const cdM = cmd.match(/^cd(\s+(.+))?$/);
  if (cdM) {
    const target = resolveCd((cdM[2] || '').trim());
    // verify by spawning pwd inside that dir
    const chk = await spawnCapture(['sh', '-c', 'pwd'], target).catch(() => null);
    if (chk && chk.code === 0) {
      setPrompt(target);
    } else {
      print(`cd: ${cdM[2] || '~'}: No such file or directory`, 'line-err');
    }
    return;
  }

  // ── all other commands ─────────────────────────────────────────────────
  disable();
  try {
    const code = await spawnStream(cmd, shellCwd);
    if (code !== 0) statusRight.textContent = `exit ${code}`;
  } catch(e) {
    print('Error: ' + e.message, 'line-err');
  }
  enable();
}

// ── start session ──────────────────────────────────────────────────────────
async function startSession(user, saved = null) {
  username = user;
  loginScreen.style.display = 'none';
  termScreen.style.display = 'flex';
  $('title-label').textContent = user + '@linux-lab';
  disable();

  print('Setting up your environment…', 'line-info');
  await setupHome(user);

  if (saved?.files) {
    print(`Restoring session from ${new Date(saved.timestamp).toLocaleString()}…`, 'line-info');
    await restoreFiles(homeDir, saved.files);
    // restore cwd if valid
    const chk = await spawnCapture(['sh','-c','pwd'], saved.cwd).catch(()=>null);
    shellCwd = (chk && chk.code === 0) ? saved.cwd : homeDir;
  } else {
    shellCwd = homeDir;
  }

  setPrompt(shellCwd);
  clearOutput();
  print(`Welcome to Linux Lab, ${user}!`, 'line-info');
  print(`Type commands below. 'save-session' or 💾 to save.`, 'line-info');
  print('', 'line-out');
  enable();
}

function doLogout() {
  username = '';
  clearOutput();
  termScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  $('restore-banner').style.display = 'none';
  $('uname').value = '';
  $('uname').focus();
}

// ── login events ───────────────────────────────────────────────────────────
function cleanUser(s) { return s.trim().toLowerCase().replace(/[^a-z0-9_]/g, ''); }
function getUser()    { return cleanUser($('uname').value); }

$('uname').addEventListener('input', () => {
  const u = getUser(), s = u ? loadSaved(u) : null;
  if (s) {
    $('restore-msg').innerHTML = `Found session for <span>${u}</span> — ${new Date(s.timestamp).toLocaleString()}`;
    $('restore-banner').style.display = 'block';
  } else {
    $('restore-banner').style.display = 'none';
  }
});
$('login-btn').addEventListener('click', () => { const u=getUser(); if(u) startSession(u); });
$('uname').addEventListener('keydown', e => { if(e.key==='Enter'){const u=getUser();if(u)startSession(u);} });
$('restore-yes').addEventListener('click', () => { const u=getUser(); if(u) startSession(u, loadSaved(u)); });
$('restore-no').addEventListener('click',  () => { const u=getUser(); if(u) startSession(u); });
$('restore-import').addEventListener('click', () => $('import-file').click());
$('import-file').addEventListener('change', async () => {
  const f = $('import-file').files[0]; if(!f) return;
  try { const s=JSON.parse(await f.text()); if(!s.user) throw 0; $('uname').value=s.user; startSession(s.user,s); }
  catch { alert('Invalid session file.'); }
  $('import-file').value = '';
});

// ── terminal events ────────────────────────────────────────────────────────
$('save-btn').addEventListener('click', async () => {
  if(!username) return;
  exportJSON(await doSave());
  print('Session saved and downloaded.', 'line-info');
});
$('logout-btn').addEventListener('click', doLogout);

cmdInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter' && !busy) {
    const cmd = cmdInput.value; cmdInput.value = '';
    await runCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const i = Math.min(histIdx+1, cmdHistory.length-1); histIdx=i; cmdInput.value=cmdHistory[i]??'';
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const i = Math.max(histIdx-1,-1); histIdx=i; cmdInput.value=i===-1?'':cmdHistory[i];
  } else if (e.ctrlKey && e.key==='l') {
    e.preventDefault(); clearOutput();
  }
});

boot();
</script>
</body>
</html>
