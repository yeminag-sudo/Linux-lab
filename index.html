<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Lab — Practice Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; color: #e6edf3; }
    #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 420px; padding: 40px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; }
    .login-box h1 { color: #3fb950; font-size: 22px; margin-bottom: 8px; }
    .login-box p  { color: #8b949e; font-size: 13px; margin-bottom: 32px; }
    .login-box label { color: #e6edf3; font-size: 14px; display: block; margin-bottom: 8px; }
    .login-row { display: flex; gap: 8px; }
    .login-box input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #3fb950; padding: 8px 12px; font-family: 'Courier New', monospace; font-size: 14px; outline: none; }
    .login-box input:focus { border-color: #3fb950; }
    .btn-login { background: #238636; border: none; border-radius: 4px; color: #fff; padding: 8px 16px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 14px; }
    .btn-login:hover { background: #2ea043; }
    .login-hint { color: #484f58; font-size: 12px; margin-top: 16px; }
    #restore-banner { display: none; margin-top: 20px; background: #1c2128; border: 1px solid #30363d; border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #8b949e; }
    #restore-banner span { color: #3fb950; }
    .restore-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm { background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; padding: 4px 12px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
    .btn-sm:hover { background: #30363d; }
    .btn-sm.primary { background: #238636; border-color: #238636; }
    .btn-sm.primary:hover { background: #2ea043; }
    #terminal-screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .titlebar { background: #161b22; border-bottom: 1px solid #30363d; padding: 6px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f57; } .dot.yellow { background: #febc2e; } .dot.green { background: #28c840; }
    .titlebar-center { color: #8b949e; font-size: 12px; }
    .titlebar-actions { display: flex; gap: 8px; }
    .btn-save { background: #1c2128; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; padding: 2px 10px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
    .btn-save:hover { color: #3fb950; border-color: #3fb950; }
    .output-area { flex: 1; overflow-y: auto; padding: 16px 20px; line-height: 1.65; cursor: text; }
    .output-area::-webkit-scrollbar { width: 6px; }
    .output-area::-webkit-scrollbar-track { background: #0d1117; }
    .output-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .line-prompt { color: #3fb950; white-space: pre-wrap; word-break: break-all; }
    .line-out    { color: #e6edf3; white-space: pre-wrap; word-break: break-all; }
    .line-err    { color: #f85149; white-space: pre-wrap; word-break: break-all; }
    .line-info   { color: #8b949e; white-space: pre-wrap; font-style: italic; }
    .input-row { display: flex; align-items: center; margin-top: 2px; }
    #cmd-input { flex: 1; background: transparent; border: none; outline: none; color: #e6edf3; font-family: 'Courier New', monospace; font-size: 14px; caret-color: #3fb950; }
    #prompt-label { white-space: pre; color: #3fb950; }
    .status-bar { background: #161b22; border-top: 1px solid #30363d; padding: 3px 20px; font-size: 11px; color: #484f58; display: flex; justify-content: space-between; flex-shrink: 0; }
    #boot-overlay { position: fixed; inset: 0; background: #0d1117; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 99; }
    #boot-overlay p { color: #3fb950; font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #3fb950; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="boot-overlay"><div class="spinner"></div><p id="boot-msg">Booting Linux Lab...</p></div>

<div id="login-screen">
  <div class="login-box">
    <h1>$ linux-lab</h1>
    <p>WebContainer Practice Terminal</p>
    <label for="uname">Enter your username:</label>
    <div class="login-row">
      <input id="uname" type="text" placeholder="e.g. student1" autocomplete="off" spellcheck="false"/>
      <button class="btn-login" id="login-btn">Login</button>
    </div>
    <div class="login-hint">No password required. Alphanumeric usernames only.</div>
    <div id="restore-banner">
      <span id="restore-msg"></span>
      <div class="restore-actions">
        <button class="btn-sm primary" id="restore-yes">Restore session</button>
        <button class="btn-sm" id="restore-no">Start fresh</button>
        <button class="btn-sm" id="restore-import">Import from file</button>
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none"/>
  </div>
</div>

<div id="terminal-screen">
  <div class="titlebar">
    <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
    <div class="titlebar-center" id="title-label">sh</div>
    <div class="titlebar-actions">
      <button class="btn-save" id="save-btn">💾 Save</button>
      <button class="btn-save" id="logout-btn">Logout</button>
    </div>
  </div>
  <div class="output-area" id="output" onclick="document.getElementById('cmd-input').focus()">
    <div class="input-row">
      <span id="prompt-label"></span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"/>
    </div>
  </div>
  <div class="status-bar"><span id="status-left">Ready</span><span id="status-right"></span></div>
</div>

<script type="module">
import { WebContainer } from 'https://esm.sh/@webcontainer/api';

// ── globals ────────────────────────────────────────────────────────────────
let wc, username, shellProcess, shellWriter;
let cmdHistory = [], histIdx = -1;
let displayCwd = '~';
const STORAGE_KEY = u => 'llv5_' + u;

// ── dom ────────────────────────────────────────────────────────────────────
const bootOverlay = document.getElementById('boot-overlay');
const bootMsg     = document.getElementById('boot-msg');
const loginScreen = document.getElementById('login-screen');
const termScreen  = document.getElementById('terminal-screen');
const output      = document.getElementById('output');
const cmdInput    = document.getElementById('cmd-input');
const promptLabel = document.getElementById('prompt-label');
const statusLeft  = document.getElementById('status-left');
const statusRight = document.getElementById('status-right');

// ── output helpers ─────────────────────────────────────────────────────────
function appendLine(text, cls = 'line-out') {
  const row = output.querySelector('.input-row');
  const d = document.createElement('div');
  d.className = cls; d.textContent = text;
  output.insertBefore(d, row);
  output.scrollTop = output.scrollHeight;
}
function clearOutput() {
  const row = output.querySelector('.input-row');
  [...output.children].forEach(c => { if (c !== row) c.remove(); });
}

// ── boot ───────────────────────────────────────────────────────────────────
async function boot() {
  try {
    wc = await WebContainer.boot();
    bootOverlay.style.display = 'none';
    loginScreen.style.display = 'flex';
    document.getElementById('uname').focus();
  } catch(e) {
    bootMsg.textContent = 'Boot failed: ' + e.message;
    bootMsg.style.color = '#f85149';
  }
}

// ── start a PERSISTENT shell process ──────────────────────────────────────
// Key insight: spawn ONE long-running `sh` process and keep writing to its
// stdin. This way `cd` persists across commands — exactly like a real terminal.
async function startShell(homePath) {
  // Write a tiny prompt-reporting wrapper script
  await wc.fs.writeFile('/.prompt.sh', `
#!/bin/sh
# Runs as the interactive shell: reads commands, prints output + sentinel
export HOME="${homePath}"
export USER="${username}"
export HOSTNAME="linux-lab"
cd "$HOME"
while true; do
  CWD=$(pwd)
  printf "\\x00PWD:$CWD\\x00"
  read -r line
  case "$line" in
    exit|logout) printf "\\x00EXIT\\x00"; break ;;
    '') ;;
    *) eval "$line" 2>&1 ;;
  esac
done
`);

  shellProcess = await wc.spawn('sh', ['/.prompt.sh']);
  const encoder = new TextEncoder();

  // Writer to shell stdin
  const stdinStream = new WritableStream({ write(chunk) {} });
  // We need a real writable — use TransformStream trick
  const { writable, readable } = new TransformStream();
  shellWriter = writable.getWriter();
  // Pipe readable → shell stdin
  readable.pipeTo(shellProcess.input);

  // ── Read shell output ──────────────────────────────────────────────────
  // We split on sentinel \x00PWD:...\x00 to know when a command finishes
  // and what the new cwd is.
  let outputBuf = '';

  shellProcess.output.pipeTo(new WritableStream({
    write(chunk) {
      outputBuf += chunk;
      // Process all complete sentinels
      let idx;
      while ((idx = outputBuf.indexOf('\x00')) !== -1) {
        const before = outputBuf.slice(0, idx);
        outputBuf = outputBuf.slice(idx + 1);

        if (before) {
          // Print regular output lines
          before.split('\n').forEach((l, i, arr) => {
            if (i < arr.length - 1 || l) appendLine(l);
          });
        }

        // Check for sentinel at start of remaining buf
        if (outputBuf.startsWith('PWD:')) {
          const end = outputBuf.indexOf('\x00');
          if (end !== -1) {
            const pwd = outputBuf.slice(4, end);
            outputBuf = outputBuf.slice(end + 1);
            updatePrompt(pwd);
            enableInput();
          }
        } else if (outputBuf.startsWith('EXIT')) {
          doLogout();
        }
      }
    }
  }));
}

async function sendToShell(cmd) {
  await shellWriter.write(cmd + '\n');
}

// ── prompt display ─────────────────────────────────────────────────────────
function updatePrompt(absPwd) {
  // Determine home path from first PWD we received
  if (!window._wcHome) window._wcHome = absPwd; // first call is always from cd $HOME
  const home = window._wcHome;
  if (absPwd === home) displayCwd = '~';
  else if (absPwd.startsWith(home + '/')) displayCwd = '~/' + absPwd.slice(home.length + 1);
  else displayCwd = absPwd;
  promptLabel.textContent = `${username}@linux-lab:${displayCwd}$ `;
  statusLeft.textContent = 'cwd: ' + displayCwd;
}

function enableInput() {
  cmdInput.disabled = false;
  cmdInput.focus();
  statusRight.textContent = '';
}

function disableInput() {
  cmdInput.disabled = true;
  statusRight.textContent = 'running...';
}

// ── run command ────────────────────────────────────────────────────────────
async function runCommand(raw) {
  const cmd = raw.trim();
  if (!cmd) { await sendToShell(''); return; }

  appendLine(promptLabel.textContent + cmd, 'line-prompt');
  cmdHistory.unshift(cmd);
  histIdx = -1;

  if (cmd === 'clear') { clearOutput(); enableInput(); return; }
  if (cmd === 'whoami') { appendLine(username); enableInput(); return; }
  if (cmd === 'hostname') { appendLine('linux-lab'); enableInput(); return; }
  if (cmd === 'save-session') {
    const s = await saveSession();
    exportSession(s);
    appendLine('Session saved and downloaded.', 'line-info');
    enableInput(); return;
  }

  disableInput();
  await sendToShell(cmd);
  // input re-enabled when PWD sentinel comes back
}

// ── session helpers ────────────────────────────────────────────────────────
async function collectFiles(path) {
  const res = {};
  try {
    for (const e of await wc.fs.readdir(path, { withFileTypes: true })) {
      const full = path + '/' + e.name;
      res[e.name] = e.isDirectory()
        ? { type:'dir', children: await collectFiles(full) }
        : { type:'file', content: await wc.fs.readFile(full,'utf-8').catch(()=>'') };
    }
  } catch {}
  return res;
}

async function restoreFiles(base, files) {
  for (const [name, node] of Object.entries(files)) {
    const p = base + '/' + name;
    if (node.type === 'dir') {
      await wc.fs.mkdir(p, { recursive:true }).catch(()=>{});
      await restoreFiles(p, node.children || {});
    } else {
      await wc.fs.writeFile(p, node.content || '').catch(()=>{});
    }
  }
}

async function saveSession() {
  const home = window._wcHome || '';
  const files = await collectFiles(home);
  const s = { user: username, timestamp: Date.now(), cwd: displayCwd, files };
  localStorage.setItem(STORAGE_KEY(username), JSON.stringify(s));
  return s;
}

function loadSession(u) {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY(u))); } catch { return null; }
}

function exportSession(s) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(s,null,2)], {type:'application/json'}));
  a.download = `linuxlab-${s.user}-${new Date(s.timestamp).toISOString().slice(0,10)}.json`;
  a.click();
}

// ── start / logout session ─────────────────────────────────────────────────
async function startSession(user, session = null) {
  username = user;
  window._wcHome = null; // reset, will be set on first PWD sentinel

  loginScreen.style.display = 'none';
  termScreen.style.display = 'flex';
  cmdInput.disabled = true;
  document.getElementById('title-label').textContent = user + '@linux-lab — sh';

  // Create user home via fs API (we know nothing about the path yet)
  // Use a predictable relative path from WC root
  const tempProc = await wc.spawn('sh', ['-c', 'mkdir -p ~/userdata/' + user + '/examples && echo OK']);
  let tempOut = '';
  await tempProc.output.pipeTo(new WritableStream({ write(c){tempOut+=c;} }));
  await tempProc.exit;

  // Get the real home path
  const pwdProc = await wc.spawn('sh', ['-c', 'echo $HOME']);
  let realHome = '';
  await pwdProc.output.pipeTo(new WritableStream({ write(c){realHome+=c;} }));
  await pwdProc.exit;
  realHome = realHome.trim();

  const userHome = realHome + '/userdata/' + user;

  // Write starter files if fresh
  await wc.fs.writeFile(userHome + '/readme.txt',
`Welcome to Linux Lab, ${user}!\n\nFiles here persist when you save your session.\nTry: ls, pwd, mkdir, touch, cat, echo, sh, node\n`
  ).catch(()=>{});
  await wc.fs.writeFile(userHome + '/examples/hello.sh', `#!/bin/sh\necho "Hello, ${user}!"\n`).catch(()=>{});
  await wc.fs.writeFile(userHome + '/examples/loop.sh',  `#!/bin/sh\nfor i in 1 2 3 4 5; do\n  echo "Line $i"\ndone\n`).catch(()=>{});
  await wc.fs.writeFile(userHome + '/examples/greet.js', `const n=process.argv[2]||'${user}';\nconsole.log('Hello from Node, '+n+'!');\n`).catch(()=>{});

  if (session?.files) {
    appendLine(`Restoring session from ${new Date(session.timestamp).toLocaleString()}...`, 'line-info');
    await restoreFiles(userHome, session.files);
  }

  appendLine(`Welcome to Linux Lab, ${user}! Type commands below.`, 'line-info');
  appendLine(`Tip: type 'save-session' or click 💾 to save your work.`, 'line-info');
  appendLine('', 'line-out');

  await startShell(userHome);
}

function doLogout() {
  username = '';
  window._wcHome = null;
  if (shellWriter) { shellWriter.close().catch(()=>{}); shellWriter = null; }
  clearOutput();
  termScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  document.getElementById('restore-banner').style.display = 'none';
  document.getElementById('uname').value = '';
  document.getElementById('uname').focus();
}

// ── login events ───────────────────────────────────────────────────────────
function cleanName(s) { return s.trim().toLowerCase().replace(/[^a-z0-9_]/g,''); }
function getUser()    { return cleanName(document.getElementById('uname').value); }

document.getElementById('uname').addEventListener('input', () => {
  const u = getUser(), s = u ? loadSession(u) : null;
  const banner = document.getElementById('restore-banner');
  if (s) {
    document.getElementById('restore-msg').innerHTML = `Found session for <span>${u}</span> — ${new Date(s.timestamp).toLocaleString()}`;
    banner.style.display = 'block';
  } else { banner.style.display = 'none'; }
});

document.getElementById('login-btn').addEventListener('click', () => { const u=getUser(); if(u) startSession(u,null); });
document.getElementById('uname').addEventListener('keydown', e => { if(e.key==='Enter'){const u=getUser();if(u)startSession(u,null);} });
document.getElementById('restore-yes').addEventListener('click', () => { const u=getUser(); if(u) startSession(u,loadSession(u)); });
document.getElementById('restore-no').addEventListener('click',  () => { const u=getUser(); if(u) startSession(u,null); });
document.getElementById('restore-import').addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', async () => {
  const file = document.getElementById('import-file').files[0]; if(!file) return;
  try { const s=JSON.parse(await file.text()); if(!s.user) throw 0; document.getElementById('uname').value=s.user; startSession(s.user,s); }
  catch { alert('Invalid session file.'); }
  document.getElementById('import-file').value='';
});

// ── terminal events ────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', async () => {
  if(!username) return;
  exportSession(await saveSession());
  appendLine('Session saved and downloaded.', 'line-info');
});
document.getElementById('logout-btn').addEventListener('click', doLogout);

cmdInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value; cmdInput.value = '';
    await runCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const i = Math.min(histIdx+1, cmdHistory.length-1); histIdx=i; cmdInput.value=cmdHistory[i]??'';
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const i = Math.max(histIdx-1,-1); histIdx=i; cmdInput.value=i===-1?'':cmdHistory[i];
  } else if (e.ctrlKey && e.key==='l') {
    e.preventDefault(); clearOutput();
  } else if (e.ctrlKey && e.key==='c') {
    appendLine('^C', 'line-err');
    await sendToShell(''); // send empty to get prompt back
    enableInput();
  }
});

boot();
</script>
</body>
</html>
